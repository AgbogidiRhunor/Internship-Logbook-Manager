<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Error{% endblock %} — SIWES Logbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
    .error-card{background:var(--bg-card);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:56px 48px;text-align:center;max-width:480px;width:100%}
    .error-code{font-size:96px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-4px;margin-bottom:8px}
    .error-title{font-size:24px;font-weight:800;color:var(--text-primary);margin-bottom:12px;letter-spacing:-0.5px}
    .error-message{font-size:15px;color:var(--text-muted);line-height:1.65;margin-bottom:32px}
    .error-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:40px}
    .error-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),#c73652);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
    .error-brand-name{font-size:15px;font-weight:700;color:var(--text-primary)}
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-card">
    <div class="error-brand">
      <div class="error-logo">SL</div>
      <span class="error-brand-name">SIWES Logbook</span>
    </div>
    <div class="error-code">{% block code %}{% endblock %}</div>
    <h1 class="error-title">{% block heading %}{% endblock %}</h1>
    <p class="error-message">{% block message %}{% endblock %}</p>
    <a href="/" class="btn btn-primary">Go to Homepage</a>
    {% if user.is_authenticated %}
    <a href="/dashboard/" class="btn btn-outline" style="margin-left:8px">Go to Dashboard</a>
    {% endif %}
  </div>
</div>
</body>
</html>
