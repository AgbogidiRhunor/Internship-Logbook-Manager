{% extends "base.html" %}
{% block title %}Delete {{ type }} — SIWES{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto">
  <div class="card-body" style="text-align:center;padding:48px 36px">
    <div style="font-size:48px;margin-bottom:16px">🗑️</div>
    <h2 style="font-size:20px;font-weight:800;color:var(--text-primary);margin-bottom:8px">Delete {{ type }}</h2>
    <p style="color:var(--text-muted);font-size:15px;margin-bottom:32px">
      Are you sure you want to delete <strong>{{ obj }}</strong>?
      This action cannot be undone.
    </p>
    <form method="post" style="display:flex;gap:12px;justify-content:center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url cancel_url %}" class="btn btn-outline">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
